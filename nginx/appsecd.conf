# AppSecD - Nginx configuration for appsecd.com
# Cloudflare Origin Certificate (Full - Strict in Cloudflare)
# Install: sudo cp /opt/navigator/nginx/appsecd.conf /etc/nginx/sites-available/ && sudo ln -sf /etc/nginx/sites-available/appsecd.conf /etc/nginx/sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx
# Disable default site: sudo rm /etc/nginx/sites-enabled/default

# Upstream for backend (PM2)
upstream appsecd_backend {
    least_conn;
    server 127.0.0.1:5001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Upstream for frontend (PM2 Next.js)
upstream appsecd_frontend {
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name appsecd.com www.appsecd.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name appsecd.com www.appsecd.com;

    # Cloudflare Origin Certificate
    ssl_certificate /opt/navigator/ssl/appsecd.cloudflare.origin.pem;
    ssl_certificate_key /opt/navigator/ssl/appsecd.cloudflare.origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client body size (reports, evidence uploads)
    client_max_body_size 25M;

    # API docs (Swagger, ReDoc, OpenAPI)
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://appsecd_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks (for load balancers)
    location ~ ^/health(/ready)?$ {
        proxy_pass http://appsecd_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Backend API — /api/* only (avoids conflict with frontend /projects, /admin, /payloads pages)
    location /api/ {
        proxy_pass http://appsecd_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://appsecd_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Frontend (Next.js) - catch-all
    location / {
        proxy_pass http://appsecd_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Next.js hot reload / _next (development) - pass through
    location /_next/ {
        proxy_pass http://appsecd_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
